# ============================================================
# Dewenwils PTW04 - Smart Timer Box 240VAC
# PCB: RT-PTW01-1.0 / SoC: BK7231N (LibreTiny)
# https://github.com/alray31/esphome-dewenwils-ptw04
# ============================================================
# Confirmed GPIO Map:
#   P24 -> OUTPUT -> Relay L1 SET   (active LOW, inverted: true)
#   P26 -> OUTPUT -> Relay L1 RESET (active LOW, inverted: true)
#   P17 -> OUTPUT -> Relay L2 SET   (active LOW, inverted: true)
#   P15 -> OUTPUT -> Relay L2 RESET (active LOW, inverted: true)
#   P21 -> OUTPUT -> LED Load (D2 red)
#   P22 -> OUTPUT -> LED Power (D1)
#   P23 -> OUTPUT -> LED WiFi (D3 blue) - ESPHome status_led
#   P28 -> INPUT  -> Physical button (SW1)
#
# Bistable (latching) relay logic — two independent relays:
#   L1 SET   = 100ms LOW pulse on P24
#   L1 RESET = 100ms LOW pulse on P26
#   L2 SET   = 100ms LOW pulse on P17
#   L2 RESET = 100ms LOW pulse on P15
#
# Reserved / unusable pins on generic-bk7231n-qfn32-tuya:
#   P2, P3, P4, P5, P10, P11, P25, P27
# ============================================================

esphome:
  name: dewenwils-ptw04
  friendly_name: "Dewenwils PTW04"
  on_boot:
    priority: -100  # After all components are fully initialized
    then:
      - if:
          condition:
            lambda: 'return id(power_on_behavior).current_option() == "Always OFF";'
          then:
            - switch.turn_off: load_switch
            - output.turn_on: relay_l1_reset
            - output.turn_on: relay_l2_reset
            - delay: 100ms
            - output.turn_off: relay_l1_reset
            - output.turn_off: relay_l2_reset
            - output.turn_off: led_load
      - if:
          condition:
            lambda: 'return id(power_on_behavior).current_option() == "Always ON";'
          then:
            - switch.turn_on: load_switch
            - output.turn_on: relay_l1_set
            - output.turn_on: relay_l2_set
            - delay: 100ms
            - output.turn_off: relay_l1_set
            - output.turn_off: relay_l2_set
            - output.turn_on: led_load
      - if:
          condition:
            lambda: 'return id(power_on_behavior).current_option() == "Restore last state";'
          then:
            - if:
                condition:
                  switch.is_on: load_switch
                then:
                  - output.turn_on: relay_l1_set
                  - output.turn_on: relay_l2_set
                  - delay: 100ms
                  - output.turn_off: relay_l1_set
                  - output.turn_off: relay_l2_set
                  - output.turn_on: led_load
                else:
                  - output.turn_on: relay_l1_reset
                  - output.turn_on: relay_l2_reset
                  - delay: 100ms
                  - output.turn_off: relay_l1_reset
                  - output.turn_off: relay_l2_reset
                  - output.turn_off: led_load
      - output.turn_on: led_power

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  baud_rate: 0  # Disables UART2 logger, freeing P26/P27 for relay GPIOs

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "PTW04 Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# ============================================================
# OUTPUTS
# ============================================================

output:
  # Relay L1 (Line 1) - bistable, active LOW
  - platform: gpio
    id: relay_l1_set
    pin:
      number: P24
      inverted: true

  - platform: gpio
    id: relay_l1_reset
    pin:
      number: P26
      inverted: true

  # Relay L2 (Line 2) - bistable, active LOW
  - platform: gpio
    id: relay_l2_set
    pin:
      number: P17
      inverted: true

  - platform: gpio
    id: relay_l2_reset
    pin:
      number: P15
      inverted: true

  # Load LED - follows relay state
  - platform: gpio
    id: led_load
    pin: P21

  # Power LED - always ON when device is powered
  - platform: gpio
    id: led_power
    pin: P22

# ============================================================
# WiFi LED (D3) - ESPHome status_led
# Fast blink  = no WiFi connection
# Slow blink  = WiFi connected, API disconnected
# Off         = WiFi + Home Assistant API connected
# ============================================================

light:
  - platform: status_led
    name: "WiFi LED"
    id: wifi_led
    pin: P23
    internal: true

# ============================================================
# SWITCH - Load control
# Both relays (L1 + L2) switch simultaneously
# ============================================================

switch:
  - platform: template
    name: "Load"
    id: load_switch
    icon: "mdi:power"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF  # Actual behavior managed by select
    turn_on_action:
      - output.turn_on: relay_l1_set
      - output.turn_on: relay_l2_set
      - delay: 100ms
      - output.turn_off: relay_l1_set
      - output.turn_off: relay_l2_set
      - output.turn_on: led_load
    turn_off_action:
      - output.turn_on: relay_l1_reset
      - output.turn_on: relay_l2_reset
      - delay: 100ms
      - output.turn_off: relay_l1_reset
      - output.turn_off: relay_l2_reset
      - output.turn_off: led_load

# ============================================================
# SELECT - Power on behavior
# Exposed natively in the HA device page under Controls
# Selection is saved to device flash memory
# ============================================================

select:
  - platform: template
    name: "Power On Behavior"
    id: power_on_behavior
    options:
      - "Always OFF"
      - "Restore last state"
      - "Always ON"
    initial_option: "Always OFF"
    optimistic: true
    restore_value: true

# ============================================================
# PHYSICAL BUTTON (SW1)
# Short press (50-500ms): toggle load
# Long press  (3s+):      restart device
# ============================================================

binary_sensor:
  - platform: gpio
    pin:
      number: P28
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    id: btn_onoff
    on_multi_click:
      - timing:
          - ON for 50ms to 500ms
          - OFF for at least 50ms
        then:
          - switch.toggle: load_switch
      - timing:
          - ON for at least 3s
        then:
          - button.press: restart_button

# ============================================================
# BUTTONS
# ============================================================

button:
  - platform: restart
    name: "Restart"
    id: restart_button

# ============================================================
# SENSORS
# ============================================================

sensor:
  - platform: uptime
    name: "Uptime"

  - platform: wifi_signal
    name: "WiFi Signal dBm"
    id: wifi_signal_dbm
    update_interval: 60s
    internal: true

  - platform: copy
    source_id: wifi_signal_dbm
    name: "WiFi Signal"
    unit_of_measurement: "%"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "SSID"
