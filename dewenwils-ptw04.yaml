# ============================================================
# Dewenwils PTW04 - Smart Timer Box 240VAC
# PCB: RT-PTW01-1.0 / SoC: BK7231N (LibreTiny)
# https://github.com/alray31/esphome-dewenwils-ptw04
# ============================================================
# Confirmed GPIO Map:
#   P24 -> OUTPUT -> Relay SET   (latches relays ON)
#   P26 -> OUTPUT -> Relay RESET (latches relays OFF)
#   P21 -> OUTPUT -> Load LED (D2 red)
#   P22 -> OUTPUT -> Power LED (D1)
#   P23 -> OUTPUT -> WiFi LED (D3 blue) - ESPHome status_led
#   P28 -> INPUT  -> Physical button (SW1)
#
# Bistable (latching) relay logic:
#   SET   = 100ms LOW pulse on P24 (inverted: true -> turn_on)
#   RESET = 100ms LOW pulse on P26 (inverted: true -> turn_on)
#
# Reserved / unusable pins on generic-bk7231n-qfn32-tuya:
#   P2, P3, P4, P5, P10, P11, P25, P27
# ============================================================

esphome:
  name: dewenwils-ptw04
  friendly_name: "Dewenwils PTW04"
  on_boot:
    priority: 800
    then:
      # Send RESET pulse at boot to ensure relays start OFF
      # regardless of their bistable memory state
      - output.turn_on: relay_reset
      - delay: 100ms
      - output.turn_off: relay_reset
      - output.turn_off: relay_set
      - output.turn_off: led_load
      - output.turn_on: led_power

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  baud_rate: 0  # Disables UART2 logger, freeing P26/P27 for relay GPIOs

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "PTW04 Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# ============================================================
# OUTPUTS
# ============================================================

output:
  # Relay SET - LOW pulse latches relays ON
  - platform: gpio
    id: relay_set
    pin:
      number: P24
      inverted: true

  # Relay RESET - LOW pulse latches relays OFF
  - platform: gpio
    id: relay_reset
    pin:
      number: P26
      inverted: true

  # Load LED - follows relay state
  - platform: gpio
    id: led_load
    pin: P21

  # Power LED - always ON when device is powered
  - platform: gpio
    id: led_power
    pin: P22

# ============================================================
# WiFi LED (D3) - ESPHome status_led
# Fast blink  = no WiFi connection
# Slow blink  = WiFi connected, API disconnected
# Off         = WiFi + Home Assistant API connected
# ============================================================

light:
  - platform: status_led
    name: "WiFi LED"
    id: wifi_led
    pin: P23
    internal: true

# ============================================================
# SWITCH - Load control
# Bistable relay logic: short SET/RESET pulses
# ALWAYS_OFF: relays always start OFF regardless of saved state
# ============================================================

switch:
  - platform: template
    name: "Load"
    id: load_switch
    icon: "mdi:power"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.turn_on: relay_set    # SET pulse
      - delay: 100ms
      - output.turn_off: relay_set
      - output.turn_on: led_load
    turn_off_action:
      - output.turn_on: relay_reset  # RESET pulse
      - delay: 100ms
      - output.turn_off: relay_reset
      - output.turn_off: led_load

# ============================================================
# PHYSICAL BUTTON (SW1)
# Short press (50-500ms): toggle load
# Long press  (3s+):      restart device
# ============================================================

binary_sensor:
  - platform: gpio
    pin:
      number: P28
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    id: btn_onoff
    on_multi_click:
      - timing:
          - ON for 50ms to 500ms
          - OFF for at least 50ms
        then:
          - switch.toggle: load_switch
      - timing:
          - ON for at least 3s
        then:
          - button.press: restart_button

# ============================================================
# BUTTONS
# ============================================================

button:
  - platform: restart
    name: "Restart"
    id: restart_button

# ============================================================
# SENSORS
# ============================================================

sensor:
  - platform: uptime
    name: "Uptime"

  - platform: wifi_signal
    name: "WiFi Signal dBm"
    id: wifi_signal_dbm
    update_interval: 60s
    internal: true

  - platform: copy
    source_id: wifi_signal_dbm
    name: "WiFi Signal"
    unit_of_measurement: "%"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "SSID"
